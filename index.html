<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Track India grid power generation and CO₂ intensity from MERIT data — daily ranges, peaks, and carbon intensity charts."
    />
    <meta name="theme-color" content="#e6eaf2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a2332" media="(prefers-color-scheme: dark)" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Power Tracker — India grid &amp; CO₂</title>
    <script>
      (function () {
        try {
          var k = 'power-tracker-theme';
          var v = localStorage.getItem(k);
          var dark =
            v === 'dark' ||
            (v !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
